repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.7
    hooks:
      - id: ruff
        args: ['--fix']
        files: ^platform/

  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest quick smoke
        entry: bash -c 'cd platform && python -m pytest tests/test_tasks_api.py tests/test_schemas_common.py -x -q --no-header --tb=line 2>/dev/null || (echo "Tests failed — fix before committing" && exit 1)'
        language: system
        files: ^platform/app/
        pass_filenames: false
        stages: [pre-commit]
