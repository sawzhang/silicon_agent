name: E2E Smoke Test

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      COMPOSE_PROJECT_NAME: e2e
    defaults:
      run:
        working-directory: platform

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH for private dependencies
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Build and start services
        run: |
          DOCKER_BUILDKIT=1 docker compose build --ssh default
          docker compose up -d --wait

      - name: Wait for app health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "App is healthy"
              exit 0
            fi
            echo "Waiting for app... ($i/30)"
            sleep 2
          done
          echo "::error::App failed to become healthy within 60s"
          docker compose logs app
          exit 1

      - name: Run deterministic control-plane regression
        shell: bash
        run: |
          set -o pipefail
          echo "## E2E Smoke Test Results" >> $GITHUB_STEP_SUMMARY
          python3 scripts/e2e_control_plane.py --base-url http://localhost:8000 --format json | tee -a $GITHUB_STEP_SUMMARY

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail=100

      - name: Cleanup
        if: always()
        run: docker compose down -v
